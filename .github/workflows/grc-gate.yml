# .github/workflows/grc-gate.yml (Lab 4.4 update)
#
# Adds keyless Cosign signing and upload to the Object Lock vault.
# Differences from Lab 4.3:
#   - Install cosign
#   - After upload-artifact, build a tar.gz, hash it, sign keyless, upload to S3
#   - Write a receipt.json with the run ID, vault key, and S3 VersionId.

name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Install tfsec
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: Conftest policy gate
        id: conftest
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          mkdir -p ../evidence
          {
            echo "["
            FIRST=1
            for ns in compliance.sc28_aws compliance.ac3_aws compliance.cm6_aws compliance.cm6 ; do
              [[ $FIRST -eq 1 ]] && FIRST=0 || printf ","
              conftest test --policy ../policies --namespace "$ns" --output=json plan.json || true
            done
            echo "]"
          } > ../evidence/conftest-results.json
          python3 -c '
          import json, sys
          d = json.load(open("../evidence/conftest-results.json"))
          fails = sum(len(r.get("failures") or []) for results in d for r in results)
          print(f"conftest failures: {fails}")
          ' # do not exit on failure here; we want to sign and store the failed evidence too

      - name: tfsec scan
        id: tfsec
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tfsec . --format sarif --out ../evidence/tfsec.sarif || true

      - name: Copy plan into evidence
        if: always()
        run: |
          cp ${{ env.TF_WORKING_DIR }}/plan.json evidence/plan.json
          cp ${{ env.TF_WORKING_DIR }}/plan.txt  evidence/plan.txt

      # ----- Lab 4.4 begins here -------------------------------------------

      - name: Bundle + sign + upload to vault
        id: sign
        if: always()
        env:
          VAULT: ${{ vars.EVIDENCE_VAULT }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUNDLE="evidence-${RUN_ID}-${SHA}.tar.gz"
          ( cd evidence && tar czf "../${BUNDLE}" . )
          shasum -a 256 "${BUNDLE}" | awk '{print $1}' > "${BUNDLE}.sha256"

          # Keyless sign. The --bundle output packages cert + sig + Rekor entry.
          cosign sign-blob --yes --bundle "${BUNDLE}.sig.bundle" "${BUNDLE}"

          # Upload everything to the vault under a per-run prefix.
          KEY_PREFIX="runs/${RUN_ID}"
          aws s3 cp "${BUNDLE}"            "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}"
          aws s3 cp "${BUNDLE}.sha256"     "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sha256"
          aws s3 cp "${BUNDLE}.sig.bundle" "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sig.bundle"

          # Receipt: run id, key, version id, sha
          VERSION_ID=$(aws s3api head-object --bucket "${VAULT}" --key "${KEY_PREFIX}/${BUNDLE}" --query VersionId --output text)
          cat > receipt.json <<EOF
          {
            "run_id":"${RUN_ID}",
            "vault":"${VAULT}",
            "bundle_key":"${KEY_PREFIX}/${BUNDLE}",
            "version_id":"${VERSION_ID}",
            "sha256":"$(cat ${BUNDLE}.sha256)",
            "commit":"${SHA}"
          }
          EOF
          aws s3 cp receipt.json "s3://${VAULT}/${KEY_PREFIX}/receipt.json"
          echo "Receipt:" && cat receipt.json

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: |
            evidence/
            evidence-${{ github.run_id }}-*.tar.gz
            evidence-${{ github.run_id }}-*.sig.bundle
            evidence-${{ github.run_id }}-*.sha256
            receipt.json
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## GRC gate run #${{ github.run_id }}

            - Conftest: `${{ steps.conftest.outcome }}`
            - tfsec:    `${{ steps.tfsec.outcome }}`
            - Sign + vault upload: `${{ steps.sign.outcome }}`

            Bundle in vault: `s3://${{ vars.EVIDENCE_VAULT }}/runs/${{ github.run_id }}/`

            Verify locally:
            ```bash
            scripts/verify-evidence.sh ${{ github.run_id }}
            ```

      - name: Decide pass/fail
        if: always()
        run: |
          # Apply the gate decision after we've signed + stored the evidence.
          python3 -c '
          import json, sys
          d = json.load(open("evidence/conftest-results.json"))
          fails = sum(len(r.get("failures") or []) for results in d for r in results)
          print(f"final conftest failures: {fails}")
          sys.exit(0 if fails == 0 else 1)
          '
